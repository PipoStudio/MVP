<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portafolio interactivo de Amplify Studio con scroll transformativo">
    <meta name="theme-color" content="#0D0D0D">
    <link rel="stylesheet" href="producto.css">
    <title>Amplify Studio | Portafolio Interactivo</title>
</head>
<body>
    <!-- 
        ZONA 1: SISTEMA DE ZOOM + SLIDER
        - Estado 1 (Zoom): Escala el contenedor desde 1x hasta 5x
        - Estado 2 (Slider): Desplaza horizontalmente las tarjetas
        - Estado 3 (Portfolio): Revela el portafolio completo
    -->
    <div class="portfolio-wrapper">
        <!-- Contenedor principal que recibe las transformaciones de scale y translateX -->
        <div class="slider-container" id="slider">
            <!-- TARJETA 1: Fotomontaje -->
            <a href="fotomontaje.html" class="card">
                <img 
                    src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800" 
                    alt="Fotomontaje profesional"
                    loading="lazy"
                >
            </a>
            
            <!-- TARJETA 2: Retouching -->
            <a href="retouching.html" class="card">
                <img 
                    src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800" 
                    alt="Servicio de retouching"
                    loading="lazy"
                >
            </a>
            
            <!-- TARJETA 3: Diseño -->
            <a href="design.html" class="card">
                <img 
                    src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800" 
                    alt="Diseño gráfico"
                    loading="lazy"
                >
            </a>
            
            <!-- TARJETA FINAL: Disparador de transición al portafolio completo -->
            <div class="card card-final" onclick="revelarPortafolioCompleto()" role="button" tabindex="0">
                <h3>Ver todo</h3>
            </div>
        </div>
    </div>

    <!-- 
        ZONA 2: PORTAFOLIO COMPLETO
        Se muestra después de pasar por todas las tarjetas
    -->
    <div class="portfolio-completo" style="display: none;">
        <h1>Portafolio General</h1>
        <a href="portafolio.html" class="btn-ver-todo">Ir al archivo completo</a>
    </div>

    <script src="producto.js"></script>
</body>
</html>
